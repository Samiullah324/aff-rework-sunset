# Production environment Docker Compose override
# Usage: docker compose --env-file .env.prod -f compose.yml -f compose.prod.yml up -d
# Note: db service is excluded as production should use external/managed database

services:
  web:
    ports:
      - "8000:8000"
    environment:
      - DJANGO_ENV=prod
    command: gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 4 --worker-class sync --timeout 120 --keep-alive 2 --log-level warning --access-logfile - --error-logfile -
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  celery:
    build: .
    command: celery -A core worker -l warning --concurrency=4
    environment:
      - DJANGO_ENV=prod
      - DJANGO_SETTINGS_MODULE=core.settings
    depends_on:
      - redis
    restart: unless-stopped
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  celery-beat:
    build: .
    command: celery -A core beat -l warning
    environment:
      - DJANGO_ENV=prod
      - DJANGO_SETTINGS_MODULE=core.settings
    depends_on:
      - redis
    restart: unless-stopped
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  # Exclude db service in production (use external/managed database)
  db:
    profiles:
      - local-only

# Production-specific volumes configuration
volumes:
  postgres_data:
    external: false  # Don't create volume in production
  redis_data:
    driver: local
