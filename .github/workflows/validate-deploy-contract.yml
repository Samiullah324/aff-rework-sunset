name: Validate deploy contract
on:
  push:
    paths:
      - '.sunset/deploy.yaml'
      - '.sunset/validate_deploy_contract.py'
  pull_request:
    paths:
      - '.sunset/deploy.yaml'
      - '.sunset/validate_deploy_contract.py'
jobs:
  validate-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install validator deps
        run: python -m pip install --upgrade pip pyyaml
      - name: Validate .sunset/deploy.yaml
        run: python .sunset/validate_deploy_contract.py
