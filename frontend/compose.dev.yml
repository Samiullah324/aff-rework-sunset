services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: frontend_app_dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:8000}
      - VITE_APP_NAME=${VITE_APP_NAME:-Frontend App Dev}
      - BACKEND_HOST=${BACKEND_HOST:-backend}
      - BACKEND_PORT=${BACKEND_PORT:-8000}
    volumes:
      - .:/app
      - /app/node_modules
      - /app/dist
    networks:
      - frontend_network
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
        - action: sync
          path: ./public
          target: /app/public
        - action: rebuild
          path: package.json

networks:
  frontend_network:
    driver: bridge
